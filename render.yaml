services:
  - type: web
    name: app-orcamentos
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: app-orcamentos-db
          property: connectionString

databases:
  - name: app-orcamentos-db
    databaseName: app_orcamentos
    user: app_orcamentos_user
