services:
  - type: web
    name: app-orcamentos
    env: python
    buildCommand: pip install -r requirements.txt && mkdir -p /opt/render/project/.cache/ms-playwright && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/.cache/ms-playwright python -m playwright install chromium
    startCommand: gunicorn main:app --workers 1 --threads 4 --bind 0.0.0.0:${PORT:-1000}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.cache/ms-playwright
      - key: WHATSAPP_PLAYWRIGHT_NO_SANDBOX
        value: "1"
      - key: WHATSAPP_PLAYWRIGHT_USE_CHROME_CHANNEL
        value: "0"
      - key: WHATSAPP_PLAYWRIGHT_AUTO_INSTALL_CHROMIUM
        value: "0"
      - key: WHATSAPP_DEBUG_LOGS
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: app-orcamentos-db
          property: connectionString

databases:
  - name: app-orcamentos-db
    databaseName: app_orcamentos
    user: app_orcamentos_user
