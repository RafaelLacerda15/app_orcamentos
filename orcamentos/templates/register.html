{% extends "base.html" %}
{% block title %}Cadastro | App Orcamentos{% endblock %}
{% block content %}
<section class="panel auth-panel">
  <div class="panel-head">
    <h1>Cadastro</h1>
  </div>

  <form method="post" class="form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label class="full">
      Usuario
      <input name="username" required minlength="3" autofocus value="{{ form_data.username if form_data else '' }}">
    </label>
    <label class="full">
      Email
      <input name="email" type="email" required value="{{ form_data.email if form_data else '' }}">
    </label>
    <label class="full">
      Telefone
      <input name="phone" required placeholder="(11) 99999-9999" value="{{ form_data.phone if form_data else '' }}">
    </label>
    <label class="full">
      CPF / CNPJ
      <input name="tax_id" required placeholder="Somente numeros" maxlength="18" value="{{ form_data.tax_id if form_data else '' }}">
    </label>
    <label class="full">
      Senha
      <input name="password" type="password" required minlength="6">
    </label>
    <label class="full">
      Confirmar senha
      <input name="confirm_password" type="password" required minlength="6">
    </label>
    <div class="full">
      <button class="button" type="submit">Criar conta</button>
      <a href="{{ url_for('main.login') }}">Ja tenho conta</a>
    </div>
  </form>
</section>
{% endblock %}
